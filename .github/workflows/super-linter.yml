---
# Super-Linter workflow template for generated repositories
# Configuration is loaded from .super-linter.env file
name: Super-Linter

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same ref to avoid redundant work on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  lint-and-format:
    name: Lint and Auto-format Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git Config
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Cache the super-linter Docker image to avoid re-pulling ~1.5 GB on every run.
      # The key is pinned to the exact image version so the cache auto-invalidates on upgrades.
      - name: Cache Super-Linter Docker image
        id: cache-super-linter
        uses: actions/cache@v5
        with:
          path: /tmp/super-linter.tar
          key: super-linter-slim-v8.5.0-${{ runner.os }}

      - name: Load cached Super-Linter image
        if: steps.cache-super-linter.outputs.cache-hit == 'true'
        run: docker load -i /tmp/super-linter.tar

      - name: Pull and cache Super-Linter image
        if: steps.cache-super-linter.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/super-linter/super-linter:slim-v8.5.0
          docker save ghcr.io/super-linter/super-linter:slim-v8.5.0 \
            -o /tmp/super-linter.tar

      - name: Load Super-Linter Config
        run: |
          # Use grep inverse matching to exclude eventual comments in the .env file
          # because the GitHub Actions command to set environment variables doesn't support comments.
          grep -v '^#' .super-linter.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Checkout PR Branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.head_ref }}
          git checkout ${{ github.head_ref }}

      - name: Run Super-Linter (Auto-fix)
        if: github.event_name == 'pull_request'
        uses: super-linter/super-linter/slim@v8.5.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false

      - name: Commit Auto-fixes
        if: github.event_name == 'pull_request'
        run: |
          if [[ -n $(git status -s) ]]; then
            git add -A
            git commit -m "chore: auto-fix linting issues [skip ci]" || echo "No changes to commit"
            git push origin ${{ github.head_ref }}
          else
            echo "No changes to commit"
          fi

      - name: Run Super-Linter (Check Only)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: super-linter/super-linter/slim@v8.5.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' }}
