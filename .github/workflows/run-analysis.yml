name: Run Investment Analysis

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

concurrency:
  group: analysis-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  check-authorization:
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/authorized-users.txt
          sparse-checkout-cone-mode: false

      - name: Check if user is authorized
        id: check
        env:
          ACTOR: ${{ github.event.sender.login }}
        run: |
          if grep -qx "$ACTOR" .github/authorized-users.txt; then
            echo "authorized=true" >> $GITHUB_OUTPUT
            echo "✅ User $ACTOR is authorized"
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "❌ User $ACTOR is NOT authorized"
          fi

      - name: Comment if unauthorized
        if: |
          steps.check.outputs.authorized == 'false' &&
          (github.event.action == 'labeled' && github.event.label.name == 'investment-analysis' ||
          github.event.action == 'opened' ||
          contains(github.event.comment.body, '/rerun'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUM --body "⚠️ Endast användare som finns i .github/authorized-users.txt kan trigga analyser. Kontakta admin."

  assign-copilot:
    needs: check-authorization
    if: needs.check-authorization.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Decide if Copilot should be assigned
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          LABEL_NAME: ${{ github.event.label.name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
        run: |
          ACTION="${{ github.event.action }}"
          HAS_LABEL=$(echo "$ISSUE_LABELS" | grep -q "investment-analysis" && echo true || echo false)

          # Issue opened with investment-analysis label
          if [[ "$EVENT_NAME" == "issues" && "$ACTION" == "opened" && "$HAS_LABEL" == "true" ]]; then
            echo "should_assign=true" >> $GITHUB_OUTPUT

          # Label 'investment-analysis' just added to existing issue
          elif [[ "$EVENT_NAME" == "issues" && "$ACTION" == "labeled" && "$LABEL_NAME" == "investment-analysis" ]]; then
            echo "should_assign=true" >> $GITHUB_OUTPUT

          # /rerun comment on an investment-analysis issue
          elif [[ "$EVENT_NAME" == "issue_comment" && "$HAS_LABEL" == "true" ]] && \
            [[ "$COMMENT_BODY" == /rerun* ]]; then
            echo "should_assign=true" >> $GITHUB_OUTPUT

          else
            echo "should_assign=false" >> $GITHUB_OUTPUT
          fi

      - name: Assign Copilot to issue
        if: steps.decide.outputs.should_assign == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUM" --add-assignee @copilot
          echo "✅ Copilot assigned to issue #$ISSUE_NUM"
