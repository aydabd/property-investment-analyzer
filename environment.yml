name: property-investment-analyzer
channels:
  - conda-forge
  - nodefaults
dependencies:
  # ── Python runtime ──────────────────────────────────────────────────────────
  - python=3.13

  # ── Pre-commit framework ────────────────────────────────────────────────────
  - pre-commit

  # ── System tools (language: system hooks in pre-commit) ─────────────────────
  - go-shfmt # shell formatter (provides shfmt binary)
  - shellcheck # shell linter
  - prettier # JSON / YAML / Markdown formatter
  - markdownlint-cli # Markdown linter
  - libxml2 # provides xmllint binary for XML validation
  - taplo # TOML formatter + validator
  - jq # JSON processor
  - coreutils # GNU coreutils for consistent cross-platform behaviour

  # ── Python linters / formatters (conda-forge, used as system hooks) ─────────
  - ruff
  - mypy
  - yamllint
  - types-pyyaml

  # ── Test suite ──────────────────────────────────────────────────────────────
  - pytest
  - pytest-cov
  - pytest-mock

  # ── Project runtime dependencies (pip — not available on conda-forge) ───────
  - pip
  - pip:
      - editorconfig-checker
      - PyGithub>=2.3.0
      - click>=8.1.0
      - loguru>=0.7.2
      - pydantic>=2.8.0
      - pydantic-settings>=2.5.0
      - pyyaml>=6.0
      - httpx>=0.27.0
      - anthropic>=0.39.0
